<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Live Wi-Fi JSON</title><style>body{font-family:system-ui;margin:0;background:#07101d;color:#eef6ff;padding:20px}.card{max-width:760px;margin:auto;background:#0f1a2b;border:1px solid #2a3d57;border-radius:18px;padding:20px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.m{background:#142238;border:1px solid #2a3d57;border-radius:12px;padding:14px}.m small{display:block;color:#9fb0c6}.m strong{font-size:24px}button{margin:6px 6px 6px 0;border:0;border-radius:10px;padding:10px 14px;background:#2563eb;color:white;font-weight:700}.stop{background:#9f1239}.status{margin:12px 0;padding:12px;border-radius:10px;background:#0a2437;color:#bae6fd}.ok{background:#083a32;color:#a7f3d0}.bad{background:#351320;color:#fecdd3}input{display:none}@media(max-width:520px){.grid{grid-template-columns:1fr}}</style></head><body><main class="card"><h1>Live Windows Wi-Fi JSON</h1><p>Select <b>Desktop\wifi-data.json</b> once. Chrome or Edge will re-read it every two seconds while your PowerShell script keeps writing the file.</p><div id="status" class="status">Not connected.</div><button id="connect">Connect wifi-data.json</button><button id="once">Load once</button><button id="disconnect" class="stop" disabled>Disconnect</button><input id="fallback" type="file" accept=".json,application/json"><div class="grid"><div class="m"><small>SSID</small><strong id="ssid">—</strong></div><div class="m"><small>Signal</small><strong id="signal">—</strong></div><div class="m"><small>Speed</small><strong id="speed">—</strong></div><div class="m"><small>Channel</small><strong id="channel">—</strong></div><div class="m"><small>Radio</small><strong id="radio">—</strong></div><div class="m"><small>Updated</small><strong id="time">—</strong></div></div><p>This page reads the selected file locally. It does not upload the JSON.</p></main><script>let handle=null,timer=null;const $=x=>document.getElementById(x);function show(d){if(!d||!Number.isFinite(Number(d.signal)))throw new Error('Invalid Wi-Fi JSON');$('ssid').textContent=d.ssid||'—';$('signal').textContent=Number(d.signal)+'%';$('speed').textContent=Number(d.speed)+' Mbps';$('channel').textContent=d.channel??'—';$('radio').textContent=d.radio||'—';$('time').textContent=d.time||new Date().toLocaleTimeString();$('status').className='status ok';$('status').textContent='Live real Windows Wi-Fi data received.'}async function read(){try{const f=await handle.getFile();show(JSON.parse(await f.text()))}catch(e){$('status').className='status bad';$('status').textContent='Read failed: '+e.message}}$('connect').onclick=async()=>{try{if(!window.showOpenFilePicker)throw new Error('Automatic file reading needs Chrome or Edge');[handle]=await showOpenFilePicker({types:[{description:'Wi-Fi JSON',accept:{'application/json':['.json']}}]});await read();clearInterval(timer);timer=setInterval(read,2000);$('disconnect').disabled=false}catch(e){$('status').className='status bad';$('status').textContent=e.message}};$('once').onclick=()=>$('fallback').click();$('fallback').onchange=async e=>{try{show(JSON.parse(await e.target.files[0].text()))}catch(err){$('status').className='status bad';$('status').textContent=err.message}};$('disconnect').onclick=()=>{clearInterval(timer);timer=null;handle=null;$('disconnect').disabled=true;$('status').className='status';$('status').textContent='Disconnected.'};</script></body></html>
