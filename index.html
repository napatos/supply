<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#9a4f32">
  <title>SupplyFlow · Warm supplier billing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260719-fresh1">
</head>
<body>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <section id="loginView" class="login-view">
    <div class="login-art" aria-hidden="true"><span>✦</span><span>●</span><span>✦</span></div>
    <form id="loginForm" class="login-card">
      <div class="logo">S</div>
      <p class="kicker">WHITE SAFFRON</p>
      <h1>Welcome back</h1>
      <p class="muted">Simple supplier bills, clear rates.</p>
      <label>Username<input id="loginUsername" autocomplete="username" value="naappe" required></label>
      <label>Password<span class="password-wrap"><input id="loginPassword" type="password" autocomplete="current-password" required><button id="togglePassword" type="button">Show</button></span></label>
      <button class="button primary wide" type="submit">Sign in</button>
      <p id="loginError" class="error"></p>
    </form>
  </section>

  <div id="app" class="app hidden">
    <header class="header">
      <button id="menuButton" class="menu-button" aria-label="Open menu">☰</button>
      <a class="wordmark" href="#" data-view="entry"><span>S</span><div><strong>SupplyFlow</strong><small>Supplier billing</small></div></a>
      <nav id="nav" class="nav" aria-label="Main navigation"></nav>
      <div class="header-end"><span id="liveStatus" class="live-status">● Live</span><button id="logoutButton" class="button ghost">Logout</button></div>
    </header>
    <div id="mobileBackdrop" class="backdrop"></div>
    <main id="main" class="main"></main>
  </div>

  <dialog id="supplierDialog">
    <form id="supplierForm" class="dialog-form">
      <div class="dialog-head"><div><p class="kicker">SUPPLIER</p><h2>Add supplier</h2></div><button type="button" class="round-button" data-close>×</button></div>
      <label>Company name<input name="vendor_name" required></label>
      <div class="two-cols"><label>Phone<input name="contact_number"></label><label>TIN / Tax ID<input name="tin_number"></label></div>
      <label>Address<textarea name="address" rows="2"></textarea></label>
      <label>Bank details<input name="bank_details"></label>
      <div class="dialog-actions"><button type="button" class="button ghost" data-close>Cancel</button><button class="button primary">Save supplier</button></div>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8"></script>
  <script src="app.js?v=20260719-fresh1"></script>
</body>
</html>
